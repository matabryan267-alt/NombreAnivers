<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación de Temas Oficiales</title>
    <!-- Fuente Moderna y Minimalista -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Cargamos la librería oficial de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            /* Fondo inspirado en la estética del video */
            background: url('https://images.unsplash.com/photo-1542228262-3d663b306a53?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor transparente (Glassmorphism) */
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #fff;
            /* Borde negro delgado y sombra para lectura */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 4px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 400;
            /* Borde negro delgado y sombra para lectura */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 2px 5px rgba(0,0,0,0.5);
        }

        .poll-question {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: #fff;
            /* Borde negro delgado */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .options-list {
            list-style: none;
            margin-bottom: 25px;
        }

        .option-item {
            margin-bottom: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 400;
            font-size: 0.9rem;
            background-color: transparent;
            color: #fff;
            /* Borde negro delgado para lectura en las opciones */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .option-label:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: #fff;
        }

        .option-label input[type="radio"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            accent-color: #fff;
            cursor: pointer;
        }

        .option-label.selected {
            background-color: rgba(255, 255, 255, 0.25);
            border-color: #fff;
            font-weight: 600;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* Botón sólido redondeado igual al video */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 30px; 
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background-color: #e2e8f0;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: rgba(255, 255, 255, 0.4);
            color: rgba(0, 0, 0, 0.8);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            display: none;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            font-weight: 500;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            /* Borde negro en mensaje de éxito */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .admin-floating-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .admin-floating-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .results-section {
            display: none;
        }

        .result-row {
            margin-bottom: 15px;
        }

        .result-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #fff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .progress-bar-bg {
            background-color: rgba(255, 255, 255, 0.2);
            height: 10px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar-fill {
            background: #fff;
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .total-badge {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .back-btn {
            background-color: transparent;
            border: 1px solid #fff;
            color: #fff;
            margin-top: 25px;
            box-shadow: none;
            /* Le damos el borde negro al texto del botón transparente */
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- VISTA DE VOTACIÓN -->
        <div id="poll-view">
            <div class="header-section">
                <h1>Elección de Tema</h1>
                <p class="subtitle">Iglesia Santuario de Dios (11° Aniversario)</p>
            </div>
            
            <p class="poll-question">Selecciona la opción de tu preferencia:</p>
            
            <form id="poll-form">
                <ul class="options-list">
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_1">
                            1. Guardando su presencia y sostenibles... (1 Sm 7:12)
                        </label>
                    </li>
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_2">
                            2. 11 años Fuertes: Ensanchando el Santuario... (Is 54:2)
                        </label>
                    </li>
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_3">
                            3. Profundizando raíces, multiplicando el fruto (Jn 15:5)
                        </label>
                    </li>
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_4">
                            4. Santuario de Dios: Luz, esperanza y refugio (Hch 5:14)
                        </label>
                    </li>
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_5">
                            5. 11 Años Sostenidos por su Gracia (1 Sm 7:12)
                        </label>
                    </li>
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_6">
                            6. Santuario de Dios: Puerta del cielo
                        </label>
                    </li>
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_7">
                            7. Ebenezer // 11 años de fidelidad y Gracia
                        </label>
                    </li>
                    <li class="option-item">
                        <label class="option-label">
                            <input type="radio" name="poll-option" value="opcion_8">
                            8. 11 Principios de Testimonio y Amor inquebrantable
                        </label>
                    </li>
                </ul>
                
                <button type="submit" class="btn" id="submit-btn" disabled>Confirmar y Votar</button>
            </form>
        </div>

        <!-- PANTALLA DE ÉXITO -->
        <div id="success-view" class="message">
            <svg style="width:50px;height:50px;margin-bottom:15px;filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg><br>
            <strong>¡Voto registrado con éxito!</strong><br>
            Tu elección se ha computado de manera segura en el sistema.
        </div>

        <!-- PANEL DE CONTROL DEL ADMINISTRADOR -->
        <div id="results-view" class="results-section">
            <div class="header-section">
                <h1>Resultados en Vivo</h1>
                <p class="subtitle">Monitoreo de tendencias (Vista Segura)</p>
            </div>
            
            <div class="total-badge">
                Votos Totales: <strong id="total-votes-count">0</strong>
            </div>

            <div id="results-container"></div>

            <button class="btn back-btn" id="close-admin-btn">Volver Atrás</button>
        </div>

    </div>

    <!-- BOTÓN DE ACCESO PRIVADO FLOTANTE -->
    <button class="admin-floating-btn" id="admin-trigger">
        <svg style="width:16px;height:16px; filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.8));" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        </svg>
        Panel
    </button>

    <script>
        // --- CONFIGURACIÓN DE VINCULACIÓN ---
        const MI_CONTRASENA = "miClave77"; 
        const SUPABASE_URL = "https://vlqfdlzezoifbnvzwkrb.supabase.co";
        // API key correcta incrustada
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZscWZkbHplem9pZmJudnp3a3JiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5ODUzNTksImV4cCI6MjA5OTU2MTM1OX0.OBf3m7bmKsd-XblDm4vTqOtRTD5E5vGAwprJbJ-EaDI";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const nombresOpciones = {
            "opcion_1": "1. Guardando su presencia",
            "opcion_2": "2. Ensanchando el Santuario",
            "opcion_3": "3. Profundizando raíces",
            "opcion_4": "4. Luz, esperanza y refugio",
            "opcion_5": "5. Sostenidos por su Gracia",
            "opcion_6": "6. Puerta del cielo",
            "opcion_7": "7. Ebenezer (Fidelidad)",
            "opcion_8": "8. Principios de Testimonio"
        };

        const form = document.getElementById('poll-form');
        const radioButtons = document.querySelectorAll('input[name="poll-option"]');
        const submitBtn = document.getElementById('submit-btn');
        const labels = document.querySelectorAll('.option-label');
        
        const pollView = document.getElementById('poll-view');
        const successView = document.getElementById('success-view');
        const resultsView = document.getElementById('results-view');
        
        const adminTrigger = document.getElementById('admin-trigger');
        const closeAdminBtn = document.getElementById('close-admin-btn');
        const resultsContainer = document.getElementById('results-container');
        const totalVotesCount = document.getElementById('total-votes-count');

        radioButtons.forEach((radio, index) => {
            radio.addEventListener('change', () => {
                labels.forEach(l => l.classList.remove('selected'));
                if (radio.checked) {
                    labels[index].classList.add('selected');
                    submitBtn.disabled = false;
                }
            });
        });

        // ENVIAR VOTO A SUPABASE
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const selected = document.querySelector('input[name="poll-option"]:checked');
            if (!selected) return;

            const seguro = confirm("¿Estás seguro de tu elección? Tu voto se sumará anónimamente.");
            if (!seguro) return;

            if (sessionStorage.getItem('voted_block')) {
                alert('Ya registraste un voto en esta sesión.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Procesando...";

            try {
                const { data: fila, error: fetchError } = await supabaseClient
                    .from('encuesta_temas')
                    .select('*')
                    .eq('id', 1)
                    .single();
                
                if (fetchError) throw fetchError;

                if (fila) {
                    let nuevoValor = (fila[selected.value] || 0) + 1;
                    
                    const { error: updateError } = await supabaseClient
                        .from('encuesta_temas')
                        .update({ [selected.value]: nuevoValor })
                        .eq('id', 1);

                    if (updateError) throw updateError;

                    sessionStorage.setItem('voted_block', 'true');
                    pollView.style.display = 'none';
                    successView.style.display = 'block';
                } else {
                    alert("No se encontró el registro inicial con ID 1 en la base de datos.");
                    resetBtn();
                }
            } catch (err) {
                console.error(err);
                alert("Error de comunicación: " + (err.message || "Error desconocido."));
                resetBtn();
            }
        });

        function resetBtn() {
            submitBtn.disabled = false;
            submitBtn.innerText = "Confirmar y Votar";
        }

        // PANEL DE ADMINISTRADOR
        adminTrigger.addEventListener('click', async () => {
            const claveIngresada = prompt("Contraseña de administrador:");
            if (claveIngresada === MI_CONTRASENA) {
                pollView.style.display = 'none';
                successView.style.display = 'none';
                resultsView.style.display = 'block';
                
                resultsContainer.innerHTML = "<p style='text-align:center; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;'>Descargando datos...</p>";
                await renderStats();
            } else if (claveIngresada !== null) {
                alert("Contraseña incorrecta.");
            }
        });

        async function renderStats() {
            try {
                let { data: fila, error } = await supabaseClient.from('encuesta_temas').select('*').eq('id', 1).single();
                if (error) throw error;
                if (!fila) return;

                let total = 0;
                for (const key in nombresOpciones) {
                    total += (fila[key] || 0);
                }
                totalVotesCount.innerText = total;
                resultsContainer.innerHTML = '';

                for (const key in nombresOpciones) {
                    const votos = fila[key] || 0;
                    const porcentaje = total > 0 ? Math.round((votos / total) * 100) : 0;

                    const row = document.createElement('div');
                    row.className = 'result-row';
                    row.innerHTML = `
                        <div class="result-info">
                            <span>${nombresOpciones[key]}</span>
                            <span>${votos} v (${porcentaje}%)</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: 0%"></div>
                        </div>
                    `;
                    resultsContainer.appendChild(row);
                    
                    setTimeout(() => {
                        const fill = row.querySelector('.progress-bar-fill');
                        if(fill) fill.style.width = `${porcentaje}%`;
                    }, 50);
                }
            } catch (error) {
                resultsContainer.innerHTML = "<p style='text-align:center; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;'>Error al obtener estadísticas.</p>";
            }
        }

        closeAdminBtn.addEventListener('click', () => {
            resultsView.style.display = 'none';
            if (sessionStorage.getItem('voted_block')) {
                successView.style.display = 'block';
            } else {
                pollView.style.display = 'block';
            }
        });
    </script>
</body>
</html>
